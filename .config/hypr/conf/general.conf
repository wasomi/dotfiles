source = colors.conf

general {
    gaps_in = 3
    gaps_out = 6

    border_size = 1

    col.active_border = $outline
    col.inactive_border = $outline_variant

    allow_tearing = true
    
    resize_on_border = true

    layout = dwindle
}

dwindle {
    pseudotile = true 
    preserve_split = true
    force_split = 2
}

master {
    new_status = slave
}
