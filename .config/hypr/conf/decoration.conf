source = colors.conf

decoration {
    rounding = 8
    rounding_power = 3

    active_opacity = 0.96
    inactive_opacity = 0.9
    fullscreen_opacity = 1
    dim_special = 0.7

    shadow {
        enabled = true

        range = 8
        render_power = 8
        offset = 0, 0
        color = $shadow
    }

    blur {
        enabled = true
        
        size = 6
        passes = 2
        noise = 0.02

        new_optimizations = true
        ignore_opacity = true
        popups = true
        popups_ignorealpha = 0.5
        special = true
    }
}
