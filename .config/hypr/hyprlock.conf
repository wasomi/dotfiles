source = ./conf/colors.conf
source = ./conf/monitors.conf

background {
    path = $image
    blur_size = 6
    blur_passes = 2
    contrast = 1
    brightness = 0.5
    vibrancy = 0.2
    vibrancy_darkness = 0.2
    noise = 0.02
}

general {
    hide_cursor = true
    ignore_empty_input = true
}

# time
label {
    monitor = $mainMonitor

	text = cmd[update:100] echo "$(date +"%H:%M:%S")"
	
    color = $on_background

    font_size = 96
	font_family = CodeNewRoman Nerd Font Propo Bold
	
    position = 0, 80
    halign = center
	valign = center
}

# month, day
label {
    monitor = $mainMonitor

	text = cmd[update:1000] echo "$(date +"%A, %B %d")"
	
    color = $on_background

    font_size = 16
	font_family = CodeNewRoman Nerd Font Propo Bold
	
    position = 0, 0
	halign = center
	valign = center
}

input-field {
    monitor = $mainMonitor

    size = 240, 56
    
    dots_size = 0.2
    dots_spacing = 0.3
    
	font_family = CodeNewRoman Nerd Font Propo Bold

    rounding = 8
    outline_thickness = 1

    check_color = $secondary
    fail_color = $error
    outer_color = $outline_variant
    inner_color = $background
    font_color = $on_background

    placeholder_text = Password
    fail_text = Wrong
    
    hide_input = false
    fade_on_empty = true

    position = 0, -168
    halign = center
    valign = center
}

# layout
label {
    monitor = $mainMonitor

    text = cmd[update:100] hyprctl -j devices | jq -r --arg kbd "$settingsKeyboardName" '.keyboards[] | select(.name == $kbd) | .active_keymap'
    
    color = $on_background

    font_size = 16
    font_family = CodeNewRoman Nerd Font Propo Bold
    
    position = -6, 6
    halign = right
    valign = bottom
}

# layout
label {
    monitor = $mainMonitor

    text = cmd[update:1000] ~/.dotfiles/.local/bin/batteryLockscreenChecker.sh  
    
    color = $on_background

    font_size = 16
    font_family = CodeNewRoman Nerd Font Propo Bold
    
    position = -6, 32
    halign = right
    valign = bottom
}
